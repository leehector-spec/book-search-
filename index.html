<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Book Search — Sweet Magnolia Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap');
  :root {
    --ink:     #1a1a2e;
    --paper:   #faf7f2;
    --spine:   #7b3f00;
    --gold:    #c8902a;
    --gold-lt: #f5e6c8;
    --rule:    #d6c9b0;
    --muted:   #8a7e6e;
    --card-bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header { background: var(--ink); padding: 28px 24px 22px; text-align: center; position: relative; overflow: hidden; }
  header::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(200,144,42,0.08) 48px, rgba(200,144,42,0.08) 49px);
    pointer-events: none;
  }
  header h1 { font-family: 'Libre Baskerville', serif; font-size: clamp(1.5rem,4vw,2.2rem); color: var(--gold); position: relative; }
  header p  { color: #9e9e9e; font-size: 0.82rem; margin-top: 5px; position: relative; }
  #meta-count { color: var(--gold); font-weight: 600; }

  /* ── Search + filter row ── */
  .search-area { max-width: 740px; margin: 28px auto 0; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; padding: 13px 16px 13px 44px;
    font-family: 'Inter', sans-serif; font-size: 1rem;
    border: 2px solid var(--rule); border-radius: 8px;
    background: var(--card-bg); color: var(--ink); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,144,42,.15); }
  #search::placeholder { color: var(--muted); }

  /* ── Folder dropdown ── */
  .folder-wrap { position: relative; flex-shrink: 0; }
  #folder-select {
    appearance: none; -webkit-appearance: none;
    padding: 13px 36px 13px 14px;
    font-family: 'Inter', sans-serif; font-size: 0.88rem;
    border: 2px solid var(--rule); border-radius: 8px;
    background: var(--card-bg); color: var(--ink);
    cursor: pointer; outline: none; min-width: 160px;
    transition: border-color .2s;
  }
  #folder-select:focus { border-color: var(--gold); }
  .folder-arrow {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: var(--muted);
  }

  .search-hint { max-width: 740px; margin: 6px auto 0; padding: 0 20px; font-size: 0.78rem; color: var(--muted); }

  /* ── Results ── */
  .results-wrap { max-width: 900px; margin: 24px auto 60px; padding: 0 20px; }
  #result-summary { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; min-height: 18px; }
  #result-summary strong { color: var(--ink); }

  .folder-group { margin-bottom: 26px; }
  .folder-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--rule); }
  .folder-name  { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; color: var(--spine); font-weight: 700; }
  .folder-count { font-size: 0.75rem; color: var(--muted); margin-left: auto; }

  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .book-card {
    background: var(--card-bg); border: 1px solid var(--rule); border-left: 3px solid var(--gold);
    border-radius: 6px; padding: 12px 14px; transition: box-shadow .15s, transform .15s;
  }
  .book-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.09); transform: translateY(-1px); }
  .book-filename { font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.35; word-break: break-word; }
  .book-filename mark { background: var(--gold-lt); color: var(--spine); border-radius: 2px; padding: 0 2px; }
  .book-meta { font-size: 0.72rem; color: var(--muted); margin-top: 5px; }

  .state-box { text-align: center; padding: 60px 20px; color: var(--muted); }
  .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .state-box p { font-size: 0.95rem; }
  .state-box small { font-size: 0.8rem; display: block; margin-top: 6px; }

  footer { text-align: center; padding: 16px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--rule); }
  footer span { color: var(--gold); }

  #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--gold); width: 0; transition: width .3s; z-index: 999; }
</style>
</head>
<body>
<div id="loading-bar"></div>

<header>
  <h1>📚 Sweet Magnolia Library</h1>
  <p>Search across <span id="meta-count">loading…</span> books · Last scanned: <span id="meta-date">—</span></p>
</header>

<div class="search-area">
  <div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Type to search… e.g. Grisham, Child, Reacher" autocomplete="off">
  </div>
  <div class="folder-wrap">
    <select id="folder-select">
      <option value="">All Folders</option>
    </select>
    <svg class="folder-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6"/>
    </svg>
  </div>
</div>
<div class="search-hint">Results appear as you type — or press Enter. Use the dropdown to filter by folder.</div>

<div class="results-wrap">
  <div id="result-summary"></div>
  <div id="results">
    <div class="state-box">
      <div class="icon">⏳</div>
      <p>Loading your library…</p>
    </div>
  </div>
</div>

<footer>Sweet Magnolia Library Search &nbsp;·&nbsp; <span>leehector-spec.github.io</span></footer>

<script>
let allBooks = [];
let folders  = [];
let activeFolder = null;
let dataReady = false;
const bar = document.getElementById('loading-bar');

async function loadData() {
  bar.style.width = '30%';
  try {
    const res = await fetch('books.json');
    bar.style.width = '60%';
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    bar.style.width = '90%';

    allBooks = data.books || [];
    dataReady = true;

    document.getElementById('meta-count').textContent = data.total.toLocaleString();
    document.getElementById('meta-date').textContent  = data.generated || '—';

    folders = [...new Set(allBooks.map(b => b.folder).filter(Boolean))].sort();
    buildFolderDropdown();

    bar.style.width = '100%';
    setTimeout(() => bar.style.display = 'none', 400);

    document.getElementById('results').innerHTML = `
      <div class="state-box">
        <div class="icon">📖</div>
        <p>Library loaded! Start typing to search.</p>
        <small>${allBooks.length.toLocaleString()} books across ${folders.length} folders</small>
      </div>`;

    const val = document.getElementById('search').value;
    if (val.trim()) renderResults(val);

  } catch(e) {
    bar.style.display = 'none';
    document.getElementById('results').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <p>Couldn't load <strong>books.json</strong>.</p>
        <small>Make sure books.json is in the same folder as this file on GitHub.</small>
      </div>`;
  }
}

function buildFolderDropdown() {
  const sel = document.getElementById('folder-select');
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  });
}

document.getElementById('folder-select').addEventListener('change', e => {
  activeFolder = e.target.value || null;
  if (dataReady) renderResults(document.getElementById('search').value);
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(text, query) {
  if (!query) return escHtml(text);
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function doSearch() {
  if (!dataReady) return;
  renderResults(document.getElementById('search').value);
}

document.getElementById('search').addEventListener('input', doSearch);
document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function renderResults(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('results');
  const summary   = document.getElementById('result-summary');

  if (!q && !activeFolder) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">📖</div>
        <p>Start typing to search your library.</p>
        <small>${allBooks.length.toLocaleString()} books ready</small>
      </div>`;
    summary.innerHTML = '';
    return;
  }

  let filtered = allBooks.filter(b => {
    const matchFolder = !activeFolder || b.folder === activeFolder;
    if (!matchFolder) return false;
    if (!q) return true;
    return b.filename.toLowerCase().includes(q) || b.folder.toLowerCase().includes(q);
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">🔍</div>
        <p>No books found for <strong>"${escHtml(query)}"</strong>.</p>
        <small>Try a different spelling or clear the folder filter.</small>
      </div>`;
    summary.innerHTML = `<strong>0</strong> results`;
    return;
  }

  const groups = {};
  filtered.forEach(b => {
    const key = b.folder || '(root)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(b);
  });

  summary.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> book${filtered.length !== 1 ? 's' : ''} found`;

  container.innerHTML = Object.entries(groups)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([folder, books]) => `
      <div class="folder-group">
        <div class="folder-header">
          <span>📁</span>
          <span class="folder-name">${escHtml(folder)}</span>
          <span class="folder-count">${books.length} book${books.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="book-grid">
          ${books.map(b => `
            <div class="book-card">
              <div class="book-filename">${highlight(b.filename, query)}</div>
              <div class="book-meta">${b.size} MB</div>
            </div>`).join('')}
        </div>
      </div>`).join('');
}

loadData();
</script>
</body>
</html>
