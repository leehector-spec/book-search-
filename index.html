<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lee Hector's Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 24px 32px;
    border-bottom: 2px solid #e94560;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }

  header .subtitle {
    font-size: 0.85rem;
    color: #a0aec0;
    margin-top: 2px;
  }

  .book-icon { font-size: 2rem; }

  .controls {
    background: #16213e;
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid #2d3748;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .controls input, .controls select {
    background: #0f3460;
    border: 1px solid #2d4a7a;
    color: #e0e0e0;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .controls input { flex: 1; min-width: 220px; }
  .controls select { min-width: 180px; }

  .controls input:focus, .controls select:focus {
    border-color: #e94560;
  }

  .controls input::placeholder { color: #718096; }

  .stats {
    margin-left: auto;
    font-size: 0.85rem;
    color: #718096;
    white-space: nowrap;
  }

  .stats span { color: #e94560; font-weight: 600; }

  .results {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .folder-section { margin-bottom: 32px; }

  .folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #2d3748;
  }

  .folder-name {
    font-size: 1rem;
    font-weight: 600;
    color: #e94560;
  }

  .folder-count {
    font-size: 0.8rem;
    color: #718096;
    background: #0f3460;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .book-card {
    background: #16213e;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color 0.2s, transform 0.1s;
  }

  .book-card:hover {
    border-color: #e94560;
    transform: translateY(-1px);
  }

  .book-filename {
    font-size: 0.9rem;
    color: #e2e8f0;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .book-meta {
    font-size: 0.75rem;
    color: #718096;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .book-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .tag {
    background: #0f3460;
    border: 1px solid #2d4a7a;
    color: #90cdf4;
    font-size: 0.7rem;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
  }

  .tag.highlight { background: #e94560; border-color: #e94560; color: #fff; }

  mark {
    background: #e9456044;
    color: #fbb6ce;
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #718096;
    font-size: 1rem;
  }

  .empty .big { font-size: 3rem; margin-bottom: 12px; }

  .loading {
    text-align: center;
    padding: 60px;
    color: #718096;
    font-size: 1rem;
  }

  .generated {
    text-align: center;
    padding: 16px;
    font-size: 0.75rem;
    color: #4a5568;
    border-top: 1px solid #2d3748;
    margin-top: 16px;
  }
</style>
</head>
<body>

<header>
  <div class="book-icon">📚</div>
  <div>
    <h1>Lee Hector's Library</h1>
    <div class="subtitle" id="header-subtitle">Loading library...</div>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search by title, author, series..." autocomplete="off">
  <select id="folder-filter">
    <option value="">All Folders</option>
  </select>
  <select id="tag-filter">
    <option value="">All Tags</option>
  </select>
  <div class="stats" id="stats"></div>
</div>

<div class="results" id="results">
  <div class="empty"><div class="big">📖</div>Start typing or select a filter to search your library.</div>
</div>

<div class="generated" id="generated"></div>

<script>
let allBooks = [];
let allFolders = [];
let allTags = [];

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

async function loadData() {
  try {
    const res = await fetch('books.json?v=' + Date.now());
    const data = await res.json();
    allBooks = data.books || [];
    allTags = data.all_tags || [];

    // Build folder list
    const folderSet = new Set(allBooks.map(b => b.folder).filter(Boolean));
    allFolders = [...folderSet].sort((a, b) => a.localeCompare(b));

    // Populate folder dropdown
    const folderSel = document.getElementById('folder-filter');
    allFolders.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      folderSel.appendChild(opt);
    });

    // Populate tag dropdown — use all_tags from JSON, fallback to scanning books
    const tagSource = allTags.length > 0 ? allTags :
      [...new Set(allBooks.flatMap(b => b.tags || []))].sort();

    const tagSel = document.getElementById('tag-filter');
    tagSource.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      tagSel.appendChild(opt);
    });

    document.getElementById('header-subtitle').textContent =
      `${allBooks.length.toLocaleString()} books · Last scanned ${data.generated}`;
    document.getElementById('generated').textContent =
      `Library index generated ${data.generated}`;

    render();
  } catch (e) {
    document.getElementById('results').innerHTML =
      '<div class="empty"><div class="big">❌</div>Could not load books.json — make sure it is in the same folder as this page.</div>';
  }
}

function render() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const folderFilter = document.getElementById('folder-filter').value;
  const tagFilter = document.getElementById('tag-filter').value;

  let filtered = allBooks.filter(b => {
    const matchesQuery = !query ||
      b.filename.toLowerCase().includes(query) ||
      (b.folder || '').toLowerCase().includes(query) ||
      (b.tags || []).some(t => t.toLowerCase().includes(query));

    const matchesFolder = !folderFilter || b.folder === folderFilter;

    const matchesTag = !tagFilter || (b.tags || []).includes(tagFilter);

    return matchesQuery && matchesFolder && matchesTag;
  });

  // Show nothing until user types or selects a filter
  if (!query && !folderFilter && !tagFilter) {
    document.getElementById('results').innerHTML =
      '<div class="empty"><div class="big">📖</div>Start typing or select a filter to search your library.</div>';
    document.getElementById('stats').innerHTML = '';
    return;
  }

  document.getElementById('stats').innerHTML =
    `Showing <span>${filtered.length.toLocaleString()}</span> of <span>${allBooks.length.toLocaleString()}</span> books`;

  if (filtered.length === 0) {
    document.getElementById('results').innerHTML =
      '<div class="empty"><div class="big">🔍</div>No books found. Try a different search or filter.</div>';
    return;
  }

  // Group by folder
  const groups = {};
  filtered.forEach(b => {
    const key = b.folder || '(Root)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(b);
  });

  const sortedGroups = Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));

  const html = sortedGroups.map(([folder, books]) => `
    <div class="folder-section">
      <div class="folder-header">
        <span>📁</span>
        <span class="folder-name">${highlight(folder, query)}</span>
        <span class="folder-count">${books.length} book${books.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="book-grid">
        ${books.map(b => {
          const tags = (b.tags || []);
          const tagHtml = tags.length > 0
            ? `<div class="book-tags">${tags.map(t =>
                `<span class="tag ${t === tagFilter ? 'highlight' : ''}">${escHtml(t)}</span>`
              ).join('')}</div>`
            : '';
          return `
            <div class="book-card">
              <div class="book-filename">${highlight(b.filename, query)}</div>
              <div class="book-meta">${b.size} MB</div>
              ${tagHtml}
            </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('results').innerHTML = html;
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') render();
});
document.getElementById('folder-filter').addEventListener('change', render);
document.getElementById('tag-filter').addEventListener('change', render);

loadData();
</script>
</body>
</html>
