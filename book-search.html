<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Book Search — Sweet Magnolia Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --ink:      #1a1a2e;
    --paper:    #faf7f2;
    --spine:    #7b3f00;
    --gold:     #c8902a;
    --gold-lt:  #f5e6c8;
    --rule:     #d6c9b0;
    --muted:    #8a7e6e;
    --card-bg:  #ffffff;
    --folder-tag: #e8f0fe;
    --folder-ink: #3c5a9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    background: var(--ink);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 48px,
      rgba(200,144,42,0.08) 48px,
      rgba(200,144,42,0.08) 49px
    );
    pointer-events: none;
  }
  header h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 0.02em;
    position: relative;
  }
  header p {
    color: #9e9e9e;
    font-size: 0.82rem;
    margin-top: 5px;
    position: relative;
  }
  #meta-count {
    color: var(--gold);
    font-weight: 600;
  }

  /* ── Search bar ──────────────────────────────────────────────────── */
  .search-wrap {
    max-width: 680px;
    margin: 32px auto 0;
    padding: 0 20px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 36px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 14px 18px 14px 48px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    border: 2px solid var(--rule);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--ink);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,144,42,.15);
  }
  #search::placeholder { color: var(--muted); }

  /* ── Filters row ─────────────────────────────────────────────────── */
  .filters {
    max-width: 680px;
    margin: 12px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }
  .folder-pill {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--card-bg);
    color: var(--ink);
    cursor: pointer;
    transition: all .15s;
    font-family: 'Inter', sans-serif;
  }
  .folder-pill:hover   { border-color: var(--gold); color: var(--gold); }
  .folder-pill.active  { background: var(--gold); border-color: var(--gold); color: #fff; }

  /* ── Results ─────────────────────────────────────────────────────── */
  .results-wrap {
    max-width: 880px;
    margin: 28px auto 60px;
    padding: 0 20px;
  }

  #result-summary {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 16px;
    min-height: 18px;
  }
  #result-summary strong { color: var(--ink); }

  /* Group by folder */
  .folder-group { margin-bottom: 28px; }
  .folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--rule);
  }
  .folder-icon { font-size: 1.1rem; }
  .folder-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.05rem;
    color: var(--spine);
    font-weight: 700;
  }
  .folder-count {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .book-card {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 12px 14px;
    transition: box-shadow .15s, transform .15s;
  }
  .book-card:hover {
    box-shadow: 0 3px 14px rgba(0,0,0,.09);
    transform: translateY(-1px);
  }
  .book-filename {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
    word-break: break-word;
  }
  .book-filename mark {
    background: var(--gold-lt);
    color: var(--spine);
    border-radius: 2px;
    padding: 0 2px;
  }
  .book-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 5px;
  }

  /* ── Empty / loading states ──────────────────────────────────────── */
  .state-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .state-box p { font-size: 0.95rem; }
  .state-box small { font-size: 0.8rem; display: block; margin-top: 6px; }

  /* ── Footer ──────────────────────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--rule);
  }
  footer span { color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>📚 Sweet Magnolia Library</h1>
  <p>Search across <span id="meta-count">—</span> books · Last scanned: <span id="meta-date">—</span></p>
</header>

<div class="search-wrap">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg>
  <input id="search" type="text" placeholder="Search by author, title, keyword… e.g. Grisham" autocomplete="off" autofocus>
</div>

<div class="filters" id="folder-filters">
  <span class="filter-label">Folder:</span>
  <!-- pills injected by JS -->
</div>

<div class="results-wrap">
  <div id="result-summary"></div>
  <div id="results">
    <div class="state-box">
      <div class="icon">📖</div>
      <p>Start typing to search your library.</p>
      <small>Searches filenames and folder names.</small>
    </div>
  </div>
</div>

<footer>
  Sweet Magnolia Library Search &nbsp;·&nbsp; <span>leehector-spec.github.io</span>
</footer>

<script>
// ── Load data ────────────────────────────────────────────────────────────────
let allBooks = [];
let folders  = [];
let activeFolder = null;

async function loadData() {
  try {
    const res = await fetch('books.json');
    if (!res.ok) throw new Error('books.json not found');
    const data = await res.json();

    allBooks = data.books || [];
    document.getElementById('meta-count').textContent = data.total.toLocaleString();
    document.getElementById('meta-date').textContent  = data.generated || '—';

    // Unique folders, sorted
    folders = [...new Set(allBooks.map(b => b.folder).filter(Boolean))].sort();
    buildFolderPills();
    renderResults('');
  } catch (e) {
    document.getElementById('results').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <p>Couldn't load <strong>books.json</strong>.</p>
        <small>Run <code>scan_books.py</code> and place the output file next to this HTML file.</small>
      </div>`;
  }
}

// ── Folder pills ─────────────────────────────────────────────────────────────
function buildFolderPills() {
  const wrap = document.getElementById('folder-filters');
  // Clear existing pills (keep label)
  [...wrap.querySelectorAll('.folder-pill')].forEach(p => p.remove());

  const all = document.createElement('button');
  all.className = 'folder-pill active';
  all.textContent = 'All';
  all.dataset.folder = '';
  all.addEventListener('click', () => setFolder(''));
  wrap.appendChild(all);

  folders.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'folder-pill';
    btn.textContent = f;
    btn.dataset.folder = f;
    btn.addEventListener('click', () => setFolder(f));
    wrap.appendChild(btn);
  });
}

function setFolder(f) {
  activeFolder = f || null;
  document.querySelectorAll('.folder-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.folder === (f || ''));
  });
  renderResults(document.getElementById('search').value);
}

// ── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  renderResults(e.target.value);
});

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(
    new RegExp(`(${escaped})`, 'gi'),
    '<mark>$1</mark>'
  );
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResults(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('results');
  const summary   = document.getElementById('result-summary');

  // Filter
  let filtered = allBooks.filter(b => {
    const matchFolder = !activeFolder || b.folder === activeFolder;
    if (!matchFolder) return false;
    if (!q) return true;
    return b.filename.toLowerCase().includes(q) ||
           b.folder.toLowerCase().includes(q);
  });

  if (!q && !activeFolder) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">📖</div>
        <p>Start typing to search your library.</p>
        <small>Searches filenames and folder names.</small>
      </div>`;
    summary.innerHTML = '';
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">🔍</div>
        <p>No books found for <strong>"${escHtml(query)}"</strong>.</p>
        <small>Try a different keyword or clear the folder filter.</small>
      </div>`;
    summary.innerHTML = `<strong>0</strong> results`;
    return;
  }

  // Group by folder
  const groups = {};
  filtered.forEach(b => {
    const key = b.folder || '(root)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(b);
  });

  summary.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> book${filtered.length !== 1 ? 's' : ''} found`;

  container.innerHTML = Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).map(([folder, books]) => `
    <div class="folder-group">
      <div class="folder-header">
        <span class="folder-icon">📁</span>
        <span class="folder-name">${escHtml(folder)}</span>
        <span class="folder-count">${books.length} book${books.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="book-grid">
        ${books.map(b => `
          <div class="book-card">
            <div class="book-filename">${highlight(b.filename, query)}</div>
            <div class="book-meta">${b.size} MB${b.ext !== '.epub' ? ' · ' + escHtml(b.ext) : ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
